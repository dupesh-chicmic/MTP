# 000-default.conf

<VirtualHost *:80>
    ServerName localhost
    ServerAdmin wizard@localhost

    DocumentRoot /var/www/html
    LogLevel info php5:debug

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    <Directory "/var/www/html">
        # Disable .htaccess
        AllowOverride None
    </Directory>

    # Set up rewrites so that all requests go to index.php
    RewriteEngine on
    # if a directory or a file exists, use it directly
    RewriteCond /var/www/html%{REQUEST_FILENAME} !-f
    RewriteCond /var/www/html%{REQUEST_FILENAME} !-d
    # otherwise forward it to index.php
    RewriteRule . /var/www/html/index.php
</VirtualHost>

<VirtualHost *:443>
    ServerName www.theguide.dev.mtp.ie
    ServerAlias api.dev.mtp.ie
    ServerAlias www.admin.dev.mtp.ie
    DocumentRoot /var/www/html/
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/dev.mtp.ie-0009/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dev.mtp.ie-0009/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/dev.mtp.ie-0009/chain.pem

    RequestHeader set X-Forwarded-Proto "https"
    # HTTP Strict Transport Security (mod_headers is required)
    #Header always set Strict-Transport-Security "max-age=63072000"

    # Set up rewrites so that all requests go to index.php                                                                                     
    RewriteEngine on                                                                                                                           
    # if a directory or a file exists, use it directly                                                                                         
    RewriteCond /var/www/html%{REQUEST_FILENAME} !-f                                                                                           
    RewriteCond /var/www/html%{REQUEST_FILENAME} !-d                                                                                           
    # otherwise forward it to index.php                                                                                                        
    RewriteRule . /var/www/html/index.php

</VirtualHost>

SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
SSLHonorCipherOrder off
SSLSessionTickets off

SSLUseStapling On
SSLStaplingCache "shmcb:logs/ssl_stapling(32768)"
